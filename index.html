<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chengyu Game</title>
    <style>
        /* Add your CSS styles here to maintain original design */
        body { font-family: Arial, sans-serif; }
        .game-container { max-width: 600px; margin: auto; text-align: center; }
        .level, .timer, .lives, .score { margin: 20px; font-size: 24px; }
        .button { padding: 10px 20px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Chengyu Game</h1>
        <div class="level">Level: <span id="level">1</span></div>
        <div class="timer">Time Left: <span id="timer">60</span> seconds</div>
        <div class="lives">Lives: <span id="lives">3</span></div>
        <div class="score">Score: <span id="score">0</span></div>
        <button class="button" id="start-button">Start Game</button>
        <div id="game-area"></div>
    </div>
    <script>
        let level = 1;
        let score = 0;
        let lives = 3;
        let timer;
        let timeLeft = 60;

        const levelElement = document.getElementById('level');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const timerElement = document.getElementById('timer');
        const startButton = document.getElementById('start-button');

        startButton.addEventListener('click', startGame);

        function startGame() {
            startButton.style.display = 'none';
            nextLevel();
        }

        function nextLevel() {
            timeLeft = 60;
            levelElement.textContent = level;
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            timer = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                clearInterval(timer);
                loseLife();
                return;
            }
            timeLeft--;
            timerElement.textContent = timeLeft;
        }

        function loseLife() {
            lives--;
            if (lives <= 0) {
                gameOver();
            } else {
                livesElement.textContent = lives;
                level++; // Level up when lives are lost
                nextLevel();
            }
        }

        function gameOver() {
            alert(`Game Over! Your score: ${score}`);
            location.reload(); // Reloads the page to restart
        }

        // Game logic and feature implementations here...
    </script>
</body>
</html>
